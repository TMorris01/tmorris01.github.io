<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMorris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0c0f;
    color: #e8edf3;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: #e8edf3;
    margin-bottom: 4px;
  }

  .sub {
    font-size: 12px;
    color: #5a6475;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* =====================================================
     LINK BUTTONS
     To add a new link, copy one <a> block below and
     paste it underneath the last one. Change the href
     to your URL and the text inside to whatever label
     you want.
     ===================================================== */
  .link-btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: #111418;
    border: 1px solid #1e2530;
    border-radius: 12px;
    color: #e8edf3;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .link-btn:hover {
    border-color: #f47c20;
    background: #181c22;
  }

  .link-btn.highlight {
    border-color: #f47c20;
    color: #f47c20;
  }

  .link-btn.highlight:hover {
    background: rgba(244,124,32,0.08);
  }
</style>
</head>
<body>
<div class="container">

  <div class="name">TMorris</div>
  <div class="sub">Links</div>

  <!-- =====================================================
       ADD / EDIT LINKS BELOW
       Copy any <a> block to add a new button.
       Change href="..." to your URL.
       Change the text between > and </a> to your label.
       ===================================================== -->
  
  <a class="link-btn highlight" href="https://tmorris01.github.io/gnlinks/" target="_self">
    Gn-Links
  </a>
  <a class="link-btn highlight" href="https://tmorris01.github.io/Blooket-Cheat/" target="_self">
    Blooket Cheat (not up)
  </a>
  <a class="link-btn highlight" onclick="enterCode()" style="cursor: pointer;">
    🏈 Recruit Hub
  </a>

  <!-- Example of how to add more buttons:
  <a class="link-btn highlight" href="https://yourlink.com" target="_self">
    Your Label Here
  </a>
  -->

</div>
</body>
<script>
function enterCode() {
  // 1. Show the popup and save what the user types
  let userCode = prompt("Please enter the code:");

  // 2. The code you want to check for
  const secretCode = "1010"; 

  // 3. Check if the code matches
  if (userCode === secretCode) {
    // Redirect if correct
    window.location.href = "https://tmorris01.github.io/recruiting-hub/"; 
  } else if (userCode === null) {
    // Do nothing if they click "Cancel"
    return;
  } else {
    // Show an error if wrong
    alert("Incorrect code! Access denied.");
  }
}
</script>
</html>
